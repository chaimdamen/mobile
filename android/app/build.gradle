apply plugin: "com.android.application"

import com.android.build.OutputFile

/**
 * The react.gradle file registers a task for each build variant (e.g. bundleDebugJsAndAssets
 * and bundleReleaseJsAndAssets).
 * These essentially call `react-native bundle` with the correct arguments during the Android build
 * cycle. By default, bundleDebugJsAndAssets is skipped, as in debug/dev mode we prefer to load the
 * bundle from the development server. However, you can enable it by setting the following in your
 * project's local.properties file (or gradle.properties):
 *
 * project.ext.react = [
 *   enableHermes: true,   // clean and rebuild if changing
 *   bundleInDebug: false,
 *   bundleInRelease: true,
 * ]
 */

project.ext.react = [
    enableHermes: true,
]

apply from: "../../node_modules/react-native/react.gradle"

/**
 * Set this to create separate APKs instead of creating one universal APK for all
 * architectures.
 */
project.ext.enableSeparateBuildPerCPUArchitecture = false

/**
 * Run Proguard to shrink the Java bytecode in release builds.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore.
 *
 * For example, to use the DebugJSCCore variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-debug:+'`
 *
 * The js2c task depends on it by changing the value. If you don't use js2c, you can use any
 * suffix of the MultiDexVariants.
 */
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion

    compileSdkVersion rootProject.ext.compileSdkVersion

    namespace "com.wppconnect.mobile"

    defaultConfig {
        applicationId "com.wppconnect.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    splits {
        abi {
            reset()
            enable enableSeparateBuildPerCPUArchitecture
            universalApk false  // If true, also generate a universal APK
            include "armeabi-v7a", "x86", "x86_64", "arm64-v8a"
        }
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // applicationVariants are e.g. debug, release
    applicationVariants.all { variant ->
        variant.outputs.each { output ->
            // For each separate APK per architecture, set a unique version code as described here:
            // https://developer.android.com/studio/build/configure-apk-splits.html
            // Example: versionCode 1 becomes 11 for armeabi-v7a, 21 for x86, etc.
            def baseAbiVersionCode = project.ext.enableSeparateBuildPerCPUArchitecture ? output.getFilter(OutputFile.ABI) : null
            if (baseAbiVersionCode != null) {
                output.versionCodeOverride = baseAbiVersionCode.archValue + defaultConfig.versionCode * 10
            }
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native gradle plugin
    implementation "com.facebook.react:react-android"
    implementation "com.facebook.react:hermes-android"

    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.10.0'
}

task copyDownloadableDepsToLibs(type: Copy) {
    from "${rootProject.ext.dependencyDir}"
    into 'libs'
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesAppBuildGradle(project)
