workflows:
  debug_build:
    name: Build React Native Debug APK
    max_build_duration: 60
    environment:
      node: 18.18.0
      java: 17
      vars:
        ANDROID_HOME: /usr/local/lib/android/sdk
        PATH: /usr/local/lib/android/sdk/platform-tools:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH
    scripts:
      - name: Install dependencies
        script: |
          echo "Installing dependencies..."
          npm install --legacy-peer-deps

      - name: Verify React Native and Node setup
        script: |
          echo "Node version:" $(node -v)
          echo "NPM version:" $(npm -v)
          npx react-native --version || echo "React Native CLI not found"

      - name: Generate React Native config
        script: |
          echo "Generating react-native.config.json..."
          npx react-native config > react-native.config.json || echo "{}" > react-native.config.json
          echo "Contents of react-native.config.json:"
          cat react-native.config.json

      - name: Build Android Debug APK
        script: |
          echo "Starting Gradle build..."
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon --stacktrace
          echo "Build finished."

    artifacts:
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - chaimdamen15@gmail.com
        notify:
          success: true
          failure: true
