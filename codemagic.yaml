workflows:
  build-react-native-debug:
    name: Build React Native Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        NODE_VERSION: 18.18.2
        JAVA_VERSION: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Clean Gradle cache
        script: |
          cd android
          ./gradlew clean
          cd ..
      - name: Build Android debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - "chaimdamen15@gmail.com"
